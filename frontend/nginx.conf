server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long cache TTL.
    location ~* \.(?:js|css|woff2?|svg|png|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other requests fall back to index.html for React Router.
    location / {
        try_files $uri /index.html;
    }
}
